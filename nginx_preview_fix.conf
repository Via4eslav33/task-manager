# Додайте цей блок всередину існуючого server {} у вашому Nginx конфігу
# /etc/nginx/sites-available/tasks.tmo2lviv.pp.ua

# Для маршрутів перегляду вкладень — дозволити iframe і не чіпати Content-Disposition
location ~* ^/tasks/\d+/attachments/\d+/preview {
    proxy_pass http://127.0.0.1:5050;

    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-For   $http_cf_connecting_ip;
    proxy_set_header X-Real-IP         $http_cf_connecting_ip;
    proxy_set_header Host              $http_host;
    proxy_http_version 1.1;

    # Не перезаписувати Content-Disposition від Flask
    proxy_pass_header Content-Disposition;

    # Прибрати X-Frame-Options щоб PDF відкривався в iframe
    proxy_hide_header X-Frame-Options;

    # Прибрати Content-Security-Policy якщо є (може блокувати iframe)
    proxy_hide_header Content-Security-Policy;
}
